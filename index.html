<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

<title>Love & Trust</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Parisienne', cursive;
  background: black;
  color: white;
  text-align: center;
}

/* ESCENAS */
.scene {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* TEXTO */
.text {
  font-size: 30px;
  margin-top: 20px;
}

/* 🌍 ESCENA 1 */
#scene1 img {
  width: 150px;
  animation: spin 10s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 🗼 ESCENA 2 */
#scene2 img {
  width: 120px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 5px gold); }
  to { filter: drop-shadow(0 0 20px gold); }
}

/* ❤️ ESCENA 3 - CORAZÓN KAWAII */
.heart {
  position: relative;
  width: 140px;
  height: 140px;
  background: #ff4d6d;
  transform: rotate(45deg);
  animation: beat 1s infinite, glowHeart 2s infinite alternate;
}

.heart:before,
.heart:after {
  content: "";
  position: absolute;
  width: 140px;
  height: 140px;
  background: #ff4d6d;
  border-radius: 50%;
}

.heart:before { top: -70px; }
.heart:after { left: -70px; }

/* 💓 ANIMACIONES */
@keyframes beat {
  0%,100% { transform: rotate(45deg) scale(1); }
  50% { transform: rotate(45deg) scale(1.15); }
}

@keyframes glowHeart {
  from { box-shadow: 0 0 10px #ff4d6d; }
  to { box-shadow: 0 0 30px #ff4d6d; }
}

/* 👀 OJOS KAWAII */
.eye {
  position: absolute;
  width: 18px;
  height: 18px;
  background: black;
  border-radius: 50%;
  top: 30px;
}

.eye.left { left: 30px; }
.eye.right { right: 30px; }

/* ✨ BRILLO OJOS */
.eye::after {
  content: "";
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  top: 3px;
  left: 3px;
}

/* 😊 BOCA */
.mouth {
  position: absolute;
  width: 30px;
  height: 15px;
  background: black;
  border-radius: 0 0 20px 20px;
  bottom: 30px;
  left: 55px;
}

/* 💗 MEJILLAS */
.cheek {
  position: absolute;
  width: 15px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  top: 50px;
  opacity: 0.7;
}

.cheek.left { left: 15px; }
.cheek.right { right: 15px; }

</style>
</head>

<body>

<!-- ESCENA 1 -->
<div id="scene1" class="scene">
  <img src="https://cdn-icons-png.flaticon.com/512/1598/1598431.png">
  <div class="text">
    No hay ciudad en este mundo que ilumine más que tu…
  </div>
</div>

<!-- ESCENA 2 -->
<div id="scene2" class="scene">
  <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
  <div class="text">
    Ni las luces que compitan con esos ojos…
  </div>
</div>

<!-- ESCENA 3 -->
<div id="scene3" class="scene">
  <div class="heart">
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
    <div class="cheek left"></div>
    <div class="cheek right"></div>
  </div>

  <div class="text">
    Porque me llevan directo a donde quiero estar ❤️
  </div>
</div>

<script>
let scenes = document.querySelectorAll('.scene');

function showScene(i){
  scenes.forEach(s => s.style.display = "none");
  scenes[i].style.display = "flex";
}

showScene(0);

setTimeout(() => { showScene(1); }, 5000);
setTimeout(() => { showScene(2); }, 10000);
</script>

</body>
</html>
